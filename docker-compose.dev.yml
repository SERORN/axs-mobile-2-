version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: axs_db
      POSTGRES_USER: axs_user
      POSTGRES_PASSWORD: axs_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - axs-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - axs-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  axs-network:
    driver: bridge
